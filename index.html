<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار علم النفس</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- شاشة البداية -->
        <div id="startScreen" class="screen active">
            <div class="welcome-box">
                <h1>🧠 اختبار علم النفس</h1>
                <p>اختبر معلوماتك في علم النفس من خلال هذه الأسئلة الممتعة</p>
                <button class="btn btn-primary" onclick="startQuiz()">ابدأ الاختبار</button>
            </div>
        </div>

        <!-- شاشة الأسئلة -->
        <div id="quizScreen" class="screen">
            <div class="quiz-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="question-info">
                    <span id="questionNumber">السؤال 1 من 100</span>
                    <span id="scoreDisplay">النقاط: 0</span>
                </div>
                
                <h2 id="questionText"></h2>
                
                <div id="optionsContainer" class="options-container"></div>
                
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn">السابق</button>
                    <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">التالي</button>
                </div>
            </div>
        </div>

        <!-- شاشة النتائج -->
        <div id="resultsScreen" class="screen">
            <div class="results-box">
                <h1>🎉 انتهيت من الاختبار!</h1>
                <div class="score-display">
                    <div class="score-circle">
                        <span id="finalScore">0</span>
                        <p>من 100</p>
                    </div>
                </div>
                <div class="result-message" id="resultMessage"></div>
                <div class="detailed-results" id="detailedResults"></div>
                <div class="button-group" style="margin-top: 30px;">
                    <button class="btn btn-primary" id="wrongAnswersBtn" onclick="showWrongAnswers()" style="display: none;">📌 عرض الأسئلة الخاطئة</button>
                    <button class="btn btn-secondary" onclick="restartQuiz()">أعد الاختبار</button>
                </div>
            </div>
        </div>

        <!-- شاشة عرض الأسئلة الخاطئة -->
        <div id="wrongAnswersScreen" class="screen">
            <div class="wrong-answers-container">
                <h1>📌 الأسئلة الخاطئة</h1>
                <div id="wrongAnswersContent"></div>
                <div class="button-group" style="margin-top: 30px; justify-content: center; gap: 15px;">
                    <button class="btn btn-secondary" onclick="backToResults()">الرجوع للنتائج</button>
                    <button class="btn btn-primary" onclick="restartQuiz()">أعد الاختبار</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
